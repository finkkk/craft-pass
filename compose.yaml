services:
  data-init:
    image: craft-pass:local
    pull_policy: never
    user: root
    restart: "no"
    network_mode: none
    read_only: true
    entrypoint: ["sh", "-c", "chown -R node:node /app/backend/data"]
    volumes:
      - ./data:/app/backend/data

  app:
    build:
      context: .
    image: craft-pass:local
    restart: unless-stopped
    depends_on:
      data-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 47821
      PORT_LOCKED: "true"
      DATABASE_URL: file:./data/craft-pass.db
      RUNTIME_DATA_DIR: /app/backend/data
      TRUST_PROXY: "true"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:47821,http://127.0.0.1:47821,http://localhost,http://127.0.0.1}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-60000}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-100}"
      ADMIN_SESSION_TTL_HOURS: "${ADMIN_SESSION_TTL_HOURS:-8}"
      RCON_ENABLED: "${RCON_ENABLED:-false}"
      RCON_HOST: "${RCON_HOST:-host.docker.internal}"
      RCON_PORT: "${RCON_PORT:-25575}"
      RCON_PASSWORD: "${RCON_PASSWORD:-}"
      RCON_TIMEOUT_MS: "${RCON_TIMEOUT_MS:-5000}"
      RCON_WHITELIST_ADD_COMMAND: "${RCON_WHITELIST_ADD_COMMAND:-whitelist add {minecraftId}}"
      RCON_WHITELIST_RELOAD_COMMAND: "${RCON_WHITELIST_RELOAD_COMMAND:-}"
      APP_SECRET: "${APP_SECRET:-}"
      SETUP_TOKEN: "${SETUP_TOKEN:-}"
    expose:
      - "47821"
    ports:
      - "127.0.0.1:${APP_PORT:-47821}:47821"
    volumes:
      - ./data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  caddy:
    image: caddy:2.10-alpine
    profiles:
      - caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
