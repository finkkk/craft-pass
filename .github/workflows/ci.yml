name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm run ci:all
      - run: npm --prefix backend run db:generate
      - run: npm run check:platform
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application image
        run: docker compose build app
      - name: Start application and wait for health check
        run: docker compose up -d --wait app
      - name: Verify HTTP health endpoint
        run: curl --fail --show-error http://127.0.0.1:47821/api/health
      - name: Show container logs
        if: always()
        run: docker compose logs --no-color app data-init
      - name: Stop containers
        if: always()
        run: docker compose down -v
